<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>台词滚动展示</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --text: #ffffff;
      --accent: #6ee7b7;
      --control-bg: rgba(16, 18, 23, 0.78);
      --control-line: rgba(255, 255, 255, 0.16);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    [hidden] {
      display: none !important;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
    }

    button {
      border: 1px solid var(--control-line);
      border-radius: 8px;
      padding: 10px 12px;
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
      font: inherit;
      cursor: pointer;
      transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
      white-space: nowrap;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.28);
    }

    button:active {
      transform: translateY(1px);
    }

    .stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: var(--bg);
      cursor: none;
    }

    .stage.show-cursor {
      cursor: default;
    }

    .stage::before,
    .stage::after {
      content: "";
      position: fixed;
      left: 0;
      right: 0;
      height: 18dvh;
      z-index: 2;
      pointer-events: none;
    }

    .stage::before {
      top: 0;
      background: linear-gradient(var(--bg), rgba(0, 0, 0, 0));
    }

    .stage::after {
      bottom: 0;
      background: linear-gradient(rgba(0, 0, 0, 0), var(--bg));
    }

    .safe-line {
      position: fixed;
      left: 0;
      right: 0;
      top: 46%;
      height: 1px;
      z-index: 3;
      background: rgba(110, 231, 183, 0.30);
      box-shadow: 0 0 0 1px rgba(110, 231, 183, 0.06);
      pointer-events: none;
      opacity: 0.65;
    }

    .track-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .script-track {
      position: absolute;
      top: 0;
      width: min(var(--content-width, 78vw), 1680px);
      white-space: pre-wrap;
      overflow-wrap: break-word;
      text-align: center;
      font-size: var(--font-size, 52px);
      line-height: var(--line-height, 1.45);
      font-weight: 700;
      letter-spacing: 0;
      color: var(--text);
      text-wrap: pretty;
      will-change: transform;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.42);
    }

    .script-track.mirror {
      scale: -1 1;
    }

    .controls {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      max-width: calc(100% - 24px);
      overflow-x: auto;
      border: 1px solid var(--control-line);
      border-radius: 10px;
      background: var(--control-bg);
      backdrop-filter: blur(14px);
      transform: translateX(-50%);
      opacity: 1;
      transition: opacity 180ms ease, translate 180ms ease;
    }

    .controls.hidden {
      opacity: 0;
      translate: 0 12px;
      pointer-events: none;
    }

    .metric {
      min-width: 84px;
      padding: 0 8px;
      color: rgba(255, 255, 255, 0.75);
      font-size: 14px;
      text-align: center;
      white-space: nowrap;
    }

    .empty {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: rgba(255, 255, 255, 0.70);
      font-size: clamp(18px, 3vw, 32px);
      text-align: center;
    }

    @media (max-width: 680px) {
      .script-track {
        width: min(var(--content-width, 88vw), 100vw);
        font-size: clamp(28px, 8vw, var(--font-size, 52px));
      }

      .safe-line {
        top: 42%;
      }

      .controls {
        left: 12px;
        right: 12px;
        bottom: 12px;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <main class="stage show-cursor" id="stage">
    <div class="safe-line" aria-hidden="true"></div>
    <div class="track-wrap">
      <div class="script-track" id="scriptTrack"></div>
    </div>
    <div class="empty" id="emptyState" hidden>请先在配置页填写台词</div>
  </main>

  <nav class="controls" id="controls" aria-label="滚动控制">
    <button type="button" id="playPause">暂停</button>
    <button type="button" id="restart">重播</button>
    <button type="button" id="slower">减速</button>
    <div class="metric" id="speedMetric">52 px/s</div>
    <button type="button" id="faster">加速</button>
    <button type="button" id="fullscreen">全屏</button>
    <button type="button" id="openConfig">配置页</button>
  </nav>

  <script>
    const STORAGE_KEY = "teleprompter.config.v1";
    const CHANNEL_NAME = "teleprompter-live-v1";

    const defaults = {
      script: "",
      speed: 52,
      fontSize: 52,
      lineHeight: 1.45,
      contentWidth: 78,
      startPosition: 72,
      textColor: "#ffffff",
      bgColor: "#050505",
      mirror: false,
      loop: false
    };

    const stage = document.getElementById("stage");
    const track = document.getElementById("scriptTrack");
    const controls = document.getElementById("controls");
    const emptyState = document.getElementById("emptyState");
    const playPause = document.getElementById("playPause");
    const speedMetric = document.getElementById("speedMetric");

    let config = { ...defaults };
    let offset = 0;
    let lastFrame = 0;
    let paused = false;
    let wheelActive = false;
    let wasPausedBeforeWheel = false;
    let rafId = 0;
    let controlsTimer = 0;
    let wheelTimer = 0;
    let channel = null;

    try {
      channel = new BroadcastChannel(CHANNEL_NAME);
      channel.addEventListener("message", (event) => {
        if (event.data && event.data.type === "config") {
          applyConfig(event.data.config, false);
        }
      });
    } catch (error) {
      channel = null;
    }

    function decodeConfig(encoded) {
      try {
        const binary = atob(encoded);
        const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
        return JSON.parse(new TextDecoder().decode(bytes));
      } catch (error) {
        return null;
      }
    }

    function readHashConfig() {
      const match = location.hash.match(/config=([^&]+)/);
      return match ? decodeConfig(match[1]) : null;
    }

    function readStoredConfig() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        return stored ? JSON.parse(stored) : null;
      } catch (error) {
        return null;
      }
    }

    function saveConfig(nextConfig) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(nextConfig));
      } catch (error) {
        return false;
      }
      return true;
    }

    function startOffset() {
      return window.innerHeight * (Number(config.startPosition) / 100);
    }

    function restartScroll() {
      offset = startOffset();
      lastFrame = performance.now();
      render();
    }

    function clampOffset(nextOffset) {
      const trackHeight = track.getBoundingClientRect().height;
      const minOffset = -trackHeight - 40;
      const maxOffset = window.innerHeight + 80;
      return Math.max(minOffset, Math.min(maxOffset, nextOffset));
    }

    function applyConfig(nextConfig, resetPosition) {
      const previousScript = config.script;
      config = { ...defaults, ...nextConfig };
      saveConfig(config);

      document.documentElement.style.setProperty("--bg", config.bgColor);
      document.documentElement.style.setProperty("--text", config.textColor);
      document.documentElement.style.setProperty("--font-size", config.fontSize + "px");
      document.documentElement.style.setProperty("--line-height", config.lineHeight);
      document.documentElement.style.setProperty("--content-width", config.contentWidth + "vw");
      track.textContent = config.script || "";
      track.classList.toggle("mirror", Boolean(config.mirror));
      speedMetric.textContent = Math.round(config.speed) + " px/s";
      emptyState.hidden = Boolean(config.script.trim());

      if (resetPosition || previousScript !== config.script) {
        restartScroll();
      } else {
        render();
      }
    }

    function render() {
      track.style.transform = "translateY(" + offset.toFixed(2) + "px)";
      playPause.textContent = paused ? "播放" : "暂停";
    }

    function frame(now) {
      const delta = Math.min(0.08, (now - lastFrame) / 1000 || 0);
      lastFrame = now;

      if (!paused && !wheelActive && config.script.trim()) {
        offset -= Number(config.speed) * delta;
        const trackHeight = track.getBoundingClientRect().height;
        if (offset < -trackHeight - 40) {
          if (config.loop) {
            offset = startOffset();
          } else {
            paused = true;
          }
        }
        render();
      }

      rafId = requestAnimationFrame(frame);
    }

    function handleWheel(event) {
      if (!config.script.trim()) {
        return;
      }

      event.preventDefault();
      showControls();

      if (!wheelActive) {
        wasPausedBeforeWheel = paused;
      }

      wheelActive = true;
      const delta = event.deltaMode === 1
        ? event.deltaY * Number(config.fontSize) * 0.9
        : event.deltaY;
      offset = clampOffset(offset - delta * 1.45);
      lastFrame = performance.now();
      render();

      clearTimeout(wheelTimer);
      wheelTimer = window.setTimeout(() => {
        wheelActive = false;
        paused = wasPausedBeforeWheel;
        lastFrame = performance.now();
        render();
      }, 180);
    }

    function changeSpeed(delta) {
      config.speed = Math.max(5, Math.min(260, Number(config.speed) + delta));
      saveConfig(config);
      speedMetric.textContent = Math.round(config.speed) + " px/s";
      if (channel) {
        channel.postMessage({ type: "config", config });
      }
    }

    function showControls() {
      stage.classList.add("show-cursor");
      controls.classList.remove("hidden");
      clearTimeout(controlsTimer);
      controlsTimer = window.setTimeout(() => {
        if (!paused) {
          stage.classList.remove("show-cursor");
          controls.classList.add("hidden");
        }
      }, 2200);
    }

    document.getElementById("playPause").addEventListener("click", () => {
      paused = !paused;
      lastFrame = performance.now();
      render();
      showControls();
    });

    document.getElementById("restart").addEventListener("click", () => {
      paused = false;
      restartScroll();
      showControls();
    });

    document.getElementById("slower").addEventListener("click", () => {
      changeSpeed(-5);
      showControls();
    });

    document.getElementById("faster").addEventListener("click", () => {
      changeSpeed(5);
      showControls();
    });

    document.getElementById("fullscreen").addEventListener("click", async () => {
      if (!document.fullscreenElement) {
        await document.documentElement.requestFullscreen().catch(() => {});
      } else {
        await document.exitFullscreen().catch(() => {});
      }
      showControls();
    });

    document.getElementById("openConfig").addEventListener("click", () => {
      window.location.href = "config.html";
      showControls();
    });

    window.addEventListener("message", (event) => {
      if (event.data && event.data.type === "teleprompter-config") {
        applyConfig(event.data.config, false);
      }
    });

    window.addEventListener("hashchange", () => {
      const hashConfig = readHashConfig();
      if (hashConfig) {
        applyConfig(hashConfig, true);
      }
    });

    window.addEventListener("resize", () => {
      if (!config.script.trim()) {
        restartScroll();
      }
    });

    window.addEventListener("mousemove", showControls);
    window.addEventListener("touchstart", showControls, { passive: true });
    window.addEventListener("wheel", handleWheel, { passive: false });

    window.addEventListener("keydown", (event) => {
      if (event.target && ["INPUT", "TEXTAREA", "SELECT"].includes(event.target.tagName)) {
        return;
      }
      if (event.code === "Space") {
        event.preventDefault();
        paused = !paused;
        render();
      } else if (event.key === "r" || event.key === "R") {
        paused = false;
        restartScroll();
      } else if (event.key === "ArrowUp" || event.key === "ArrowRight") {
        changeSpeed(5);
      } else if (event.key === "ArrowDown" || event.key === "ArrowLeft") {
        changeSpeed(-5);
      } else if (event.key === "f" || event.key === "F") {
        document.getElementById("fullscreen").click();
      }
      showControls();
    });

    applyConfig(readHashConfig() || readStoredConfig() || defaults, true);
    rafId = requestAnimationFrame((now) => {
      lastFrame = now;
      rafId = requestAnimationFrame(frame);
    });
    showControls();
  </script>
</body>
</html>
